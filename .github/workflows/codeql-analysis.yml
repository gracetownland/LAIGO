name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan on Mondays at 08:30 UTC
    - cron: "30 8 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Build JavaScript and TypeScript
        if: matrix.language == 'javascript-typescript'
        run: |
          npm ci
          (cd cdk && npm ci && npm run build)
          (cd frontend && npm ci && npm run build)

      - name: Install Python dependencies
        if: matrix.language == 'python'
        run: |
          python -m pip install --upgrade pip
          pip install -r cdk/lambda/text_generation/requirements.txt
          pip install -r cdk/lambda/playground_generation/requirements.txt
          pip install -r cdk/layers/psycopg3/requirements.txt

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
