openapi: 3.0.0
info:
  title: LAIGO API
  version: 1.0.0
  description: API for LAIGO AI Assistant with role-based access control
tags:
  - name: Student
    description: endpoints accessible by students
  - name: Instructor
    description: endpoints accessible by instructors
  - name: Admin
    description: endpoints accessible by admins
x-amazon-apigateway-request-validators:
  all:
    validateRequestParameters: true
    validateRequestBody: true
  params-only:
    validateRequestParameters": true
    validateRequestBody": false
x-amazon-apigateway-request-validator: params-only
x-amazon-apigateway-gateway-responses:
  UNAUTHORIZED:
    statusCode: "401"
    responseParameters:
      gatewayresponse.header.Access-Control-Allow-Headers: "'*'"
      gatewayresponse.header.Access-Control-Allow-Methods: "'*'"
      gatewayresponse.header.Access-Control-Allow-Origin:
        Fn::Sub: "'${CorsAllowedOrigin}'"
      gatewayresponse.header.X-Content-Type-Options: "'nosniff'"
      gatewayresponse.header.X-Frame-Options: "'DENY'"
      gatewayresponse.header.Content-Security-Policy: "'default-src 'none'; frame-ancestors 'none';'"
      gatewayresponse.header.Strict-Transport-Security: "'max-age=31536000; includeSubDomains'"
    responseTemplates:
      application/json: |
        {"message":$context.error.messageString}
  ACCESS_DENIED:
    statusCode: "403"
    responseParameters:
      gatewayresponse.header.Access-Control-Allow-Headers: "'*'"
      gatewayresponse.header.Access-Control-Allow-Methods: "'*'"
      gatewayresponse.header.Access-Control-Allow-Origin:
        Fn::Sub: "'${CorsAllowedOrigin}'"
      gatewayresponse.header.X-Content-Type-Options: "'nosniff'"
      gatewayresponse.header.X-Frame-Options: "'DENY'"
      gatewayresponse.header.Content-Security-Policy: "'default-src 'none'; frame-ancestors 'none';'"
      gatewayresponse.header.Strict-Transport-Security: "'max-age=31536000; includeSubDomains'"
  DEFAULT_4XX:
    responseParameters:
      gatewayresponse.header.Access-Control-Allow-Origin:
        Fn::Sub: "'${CorsAllowedOrigin}'"
      gatewayresponse.header.X-Content-Type-Options: "'nosniff'"
      gatewayresponse.header.X-Frame-Options: "'DENY'"
      gatewayresponse.header.Content-Security-Policy: "'default-src 'none'; frame-ancestors 'none';'"
      gatewayresponse.header.Strict-Transport-Security: "'max-age=31536000; includeSubDomains'"
  DEFAULT_5XX:
    responseParameters:
      gatewayresponse.header.Access-Control-Allow-Origin:
        Fn::Sub: "'${CorsAllowedOrigin}'"
      gatewayresponse.header.X-Content-Type-Options: "'nosniff'"
      gatewayresponse.header.X-Frame-Options: "'DENY'"
      gatewayresponse.header.Content-Security-Policy: "'default-src 'none'; frame-ancestors 'none';'"
      gatewayresponse.header.Strict-Transport-Security: "'max-age=31536000; includeSubDomains'"
x-common-options: &commonOptions
  options:
    summary: CORS support
    description: |
      Enable CORS by returning correct headers
    responses:
      200:
        $ref: "#/components/responses/Success"
    x-amazon-apigateway-integration:
      type: mock
      requestTemplates:
        application/json: |
          {
            "statusCode" : 200
          }
      responses:
        default:
          statusCode: "200"
          responseParameters:
            method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
            method.response.header.Access-Control-Allow-Methods: "'*'"
            method.response.header.Access-Control-Allow-Origin:
              Fn::Sub: "'${CorsAllowedOrigin}'"
          responseTemplates:
            application/json: |
              {}

components:
  securitySchemes:
    adminAuthorizer:
      type: apiKey
      name: Authorization
      in: header
      x-amazon-apigateway-authtype: custom
      x-amazon-apigateway-authorizer:
        type: token
        authorizerUri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminLambdaAuthorizer.Arn}/invocations
        authorizerResultTtlInSeconds: 60

    instructorAuthorizer:
      type: apiKey
      name: Authorization
      in: header
      x-amazon-apigateway-authtype: custom
      x-amazon-apigateway-authorizer:
        type: token
        authorizerUri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${instructorLambdaAuthorizer.Arn}/invocations
        authorizerResultTtlInSeconds: 60

    studentAuthorizer:
      type: apiKey
      name: Authorization
      in: header
      x-amazon-apigateway-authtype: custom
      x-amazon-apigateway-authorizer:
        type: token
        authorizerUri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${studentLambdaAuthorizer.Arn}/invocations
        authorizerResultTtlInSeconds: 60

  responses:
    Success:
      description: Request success
      headers:
        Access-Control-Allow-Origin:
          schema:
            type: string
        Access-Control-Allow-Methods:
          schema:
            type: string
        Access-Control-Allow-Headers:
          schema:
            type: string

paths:
  /admin/health:
    get:
      summary: Admin health check
      security:
        - adminAuthorizer: []
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: '{"statusCode": 200}'
        responses:
          default:
            statusCode: 200
            responseTemplates:
              application/json: '{"status": "ok", "role": "admin"}'
      responses:
        "200":
          description: Success

  /admin/instructors:
    options:
      summary: CORS support
      description: |
        Enable CORS by returning correct headers
      responses:
        200:
          $ref: "#/components/responses/Success"
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: |
            {
              "statusCode" : 200
            }
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin:
                Fn::Sub: "'${CorsAllowedOrigin}'"
            responseTemplates:
              application/json: |
                {}
    get:
      tags:
        - Admin
      summary: List all instructors
      operationId: admin_list_instructors_GET
      security:
        - adminAuthorizer: []
      responses:
        "200":
          description: List of instructors
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations"
        passthroughBehavior: "when_no_match"
        httpMethod: "POST"
        type: "aws_proxy"

  /admin/students:
    options:
      summary: CORS support
      description: |
        Enable CORS by returning correct headers
      responses:
        200:
          $ref: "#/components/responses/Success"
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: |
            {
              "statusCode" : 200
            }
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin:
                Fn::Sub: "'${CorsAllowedOrigin}'"
            responseTemplates:
              application/json: |
                {}
    get:
      tags:
        - Admin
      summary: List all students
      operationId: admin_list_students_GET
      security:
        - adminAuthorizer: []
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations"
        passthroughBehavior: "when_no_match"
        httpMethod: "POST"
        type: "aws_proxy"

  /admin/users:
    options:
      summary: CORS support
      description: |
        Enable CORS by returning correct headers
      responses:
        200:
          $ref: "#/components/responses/Success"
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: |
            {
              "statusCode" : 200
            }
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin:
                Fn::Sub: "'${CorsAllowedOrigin}'"
            responseTemplates:
              application/json: |
                {}
    get:
      tags:
        - Admin
      summary: List all users with pagination and search
      operationId: admin_list_users_GET
      security:
        - adminAuthorizer: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 0
          description: Page number for pagination
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Number of items per page
        - in: query
          name: search
          schema:
            type: string
          description: Search term for first name, last name, or email
        - in: query
          name: role
          schema:
            type: string
          description: Filter by role (admin, instructor, student, or all)
      responses:
        "200":
          description: List of users and total count
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
                  totalCount:
                    type: integer
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations"
        passthroughBehavior: "when_no_match"
        httpMethod: "POST"
        type: "aws_proxy"

  /admin/user_role:
    options:
      summary: CORS support
      description: |
        Enable CORS by returning correct headers
      responses:
        200:
          $ref: "#/components/responses/Success"
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: |
            {
              "statusCode" : 200
            }
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'PUT,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin:
                Fn::Sub: "'${CorsAllowedOrigin}'"
            responseTemplates:
              application/json: |
                {}
    put:
      tags:
        - Admin
      summary: Add or remove a single role from a user
      operationId: admin_user_role_PUT
      security:
        - adminAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - operation
                - role
              properties:
                email:
                  type: string
                operation:
                  type: string
                  enum: [add, remove]
                role:
                  type: string
                  enum: [admin, instructor, student]
      responses:
        "200":
          description: Role updated successfully
        "400":
          description: Bad request (invalid fields, or would leave user with no roles)
        "404":
          description: User not found
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations"
        passthroughBehavior: "when_no_match"
        httpMethod: "POST"
        type: "aws_proxy"

  /admin/elevate_instructor:
    options:
      summary: CORS support
      description: |
        Enable CORS by returning correct headers
      responses:
        200:
          $ref: "#/components/responses/Success"
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: |
            {
              "statusCode" : 200
            }
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin:
                Fn::Sub: "'${CorsAllowedOrigin}'"
            responseTemplates:
              application/json: |
                {}
    post:
      tags:
        - Admin
      summary: Elevate user to instructor
      operationId: admin_elevate_instructor_POST
      security:
        - adminAuthorizer: []
      parameters:
        - in: query
          name: email
          required: true
          schema:
            type: string
          description: The email of the user to elevate
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad Request
        "404":
          description: User not found
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations"
        passthroughBehavior: "when_no_match"
        httpMethod: "POST"
        type: "aws_proxy"

  /admin/assign_instructor_to_student:
    options:
      summary: CORS support
      description: |
        Enable CORS by returning correct headers
      responses:
        200:
          $ref: "#/components/responses/Success"
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: |
            {
              "statusCode" : 200
            }
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'POST,DELETE,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin:
                Fn::Sub: "'${CorsAllowedOrigin}'"
            responseTemplates:
              application/json: |
                {}
    post:
      tags:
        - Admin
      summary: Assign an instructor to a student
      operationId: admin_assign_instructor_POST
      security:
        - adminAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - instructor_id
                - student_id
              properties:
                instructor_id:
                  type: string
                student_id:
                  type: string
      responses:
        "200":
          description: Assigned successfully
        "400":
          description: Invalid request
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations"
        passthroughBehavior: "when_no_match"
        httpMethod: "POST"
        type: "aws_proxy"
    delete:
      tags:
        - Admin
      summary: Remove instructor assignment from student
      operationId: admin_assign_instructor_DELETE
      security:
        - adminAuthorizer: []
      parameters:
        - in: query
          name: instructor_id
          required: true
          schema:
            type: string
        - in: query
          name: student_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations"
        passthroughBehavior: "when_no_match"
        httpMethod: "POST"
        type: "aws_proxy"

  /admin/instructorStudents:
    options:
      summary: CORS support
      description: |
        Enable CORS by returning correct headers
      responses:
        200:
          $ref: "#/components/responses/Success"
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: |
            {
              "statusCode" : 200
            }
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin:
                Fn::Sub: "'${CorsAllowedOrigin}'"
            responseTemplates:
              application/json: |
                {}
    get:
      tags:
        - Admin
      summary: Get students assigned to an instructor
      operationId: admin_instructorStudents_GET
      security:
        - adminAuthorizer: []
      parameters:
        - in: query
          name: instructor_id
          required: true
          schema:
            type: string
          description: The instructor's user ID
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    user_id:
                      type: string
                    first_name:
                      type: string
                    last_name:
                      type: string
                    user_email:
                      type: string
        "400":
          description: Bad Request
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations"
        passthroughBehavior: "when_no_match"
        httpMethod: "POST"
        type: "aws_proxy"

  /admin/prompt:
    options:
      summary: CORS support
      description: |
        Enable CORS by returning correct headers
      responses:
        200:
          $ref: "#/components/responses/Success"
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: |
            {
              "statusCode" : 200
            }
        responses:
          default:
            statusCode: "200"
            responseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin:
                Fn::Sub: "'${CorsAllowedOrigin}'"
            responseTemplates:
              application/json: |
                {}
    post:
      tags:
        - Admin
      summary: Create a prompt version
      operationId: admin_create_prompt_POST
      security:
        - adminAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - category
                - prompt_text
              properties:
                category:
                  type: string
                  description: Prompt category (e.g., "student_chat", "case_summary")
                prompt_scope:
                  type: string
                  enum: [block, full_case]
                  description: Optional scope. Use "full_case" for synthesis prompts, otherwise defaults to "block".
                block_type:
                  type: string
                  nullable: true
                  description: Block type for block-scope prompts. Omit for full_case scope.
                prompt_text:
                  type: string
                  minLength: 1
                  description: The prompt content
                version_name:
                  type: string
                  minLength: 1
                  description: Human-friendly version name
                author_id:
                  type: string
                  description: Optional author id
      responses:
        "200":
          description: Prompt version created
          content:
            application/json:
              schema:
                type: object
                properties:
                  prompt_version_id:
                    type: integer
                  category:
                    type: string
                  prompt_scope:
                    type: string
                  block_type:
                    type: string
                    nullable: true
                  version_number:
                    type: integer
                  version_name:
                    type: string
                  prompt_text:
                    type: string
                  author_id:
                    type: string
                  is_active:
                    type: boolean
        "400":
          description: Invalid value
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations"
        passthroughBehavior: "when_no_match"
        httpMethod: "POST"
        type: "aws_proxy"

    get:
      tags:
        - Admin
      summary: List all prompt versions
      operationId: admin_list_prompts_GET
      security:
        - adminAuthorizer: []
      parameters:
        - in: query
          name: category
          required: false
          schema:
            type: string
          description: Optional category filter.
        - in: query
          name: block_type
          required: false
          schema:
            type: string
          description: Optional block filter for block-scope prompts.
        - in: query
          name: prompt_scope
          required: false
          schema:
            type: string
            enum: [block, full_case]
          description: Optional scope filter. Use full_case to fetch full-case synthesis prompts.
      responses:
        "200":
          description: List of prompt versions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    prompt_version_id:
                      type: integer
                    category:
                      type: string
                    prompt_scope:
                      type: string
                    block_type:
                      type: string
                      nullable: true
                    version_number:
                      type: integer
                    version_name:
                      type: string
                    prompt_text:
                      type: string
                    author_id:
                      type: string
                    time_created:
                      type: string
                    is_active:
                      type: boolean
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations"
        passthroughBehavior: "when_no_match"
        httpMethod: "POST"
        type: "aws_proxy"

    put:
      tags:
        - Admin
      summary: Update a prompt version
      operationId: admin_update_prompt_PUT
      security:
        - adminAuthorizer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - prompt_version_id
                - prompt_text
                - version_name
              properties:
                prompt_version_id:
                  type: string
                  description: The ID of the prompt version to update
                prompt_text:
                  type: string
                  minLength: 1
                  description: Updated prompt content. Must not be empty.
                version_name:
                  type: string
                  minLength: 1
                  description: Updated version name. Must not be empty.
      responses:
        "200":
          description: Prompt version updated
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid request
        "404":
          description: Prompt version not found
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations"
        passthroughBehavior: "when_no_match"
        httpMethod: "POST"
        type: "aws_proxy"

    delete:
      tags:
        - Admin
      summary: Delete a prompt version
      operationId: admin_delete_prompt_DELETE
      security:
        - adminAuthorizer: []
      parameters:
        - in: query
          name: prompt_version_id
          required: true
          schema:
            type: integer
          description: The id of the prompt version to delete
      responses:
        "200":
          description: Prompt deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  category:
                    type: string
                  prompt_scope:
                    type: string
                  block_type:
                    type: string
                    nullable: true
        "400":
          description: Cannot delete active prompt or invalid request
        "404":
          description: Prompt version not found
        "500":
          description: Internal Server Error
      x-amazon-apigateway-integration:
        uri:
          Fn::Sub: "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${adminFunction.Arn}/invocations"
        passthroughBehavior: "when_no_match"
        httpMethod: "POST"
        type: "aws_proxy"

  /admin/prompt/active:
    options:
      summary: CORS support
      description: |
        Enable CORS by returning correct headers
      responses:
        200:
          $ref: "#/components/responses/Success"
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: |
            {
              "statusCode" : 200
            }
